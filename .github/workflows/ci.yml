name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (black + flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # cache: pip
      - run: pip install black==24.4.2 flake8==7.1.0
      - run: black --check --diff .
      - run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=.git,__pycache__,.terraform,node_modules \
            --extend-ignore=E203,W503

  docker-smoke-test:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p logs plugins dags
      - run: docker compose up -d --build --wait --wait-timeout 120
      - run: docker compose ps
      - name: Assert no container exited
        run: |
          EXITED=$(docker compose ps --status exited --quiet)
          if [ -n "$EXITED" ]; then
            docker compose ps --status exited
            docker compose logs
            exit 1
          fi
      - if: always()
        run: docker compose down -v

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"
      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false
      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive
      - name: Terraform validate
        working-directory: terraform
        run: terraform validate