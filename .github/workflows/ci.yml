name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (black + flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # cache: pip
      - run: pip install black==24.4.2 flake8==7.1.0
      - run: black --check --diff .
      - run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=.git,__pycache__,.terraform,node_modules \
            --extend-ignore=E203,W503

