version: 2

sources:
  - name: raw
    database: CRYPTO_ANALYTICS_DB
    schema: RAW
    loader: spark_snowflake_connector
    tables:
      - name: trades
        description: "Raw trade events loaded from Delta Lake via Spark Snowflake connector"
        config:
          loaded_at_field: ingestion_ts
          freshness:
            warn_after: {count: 1, period: day}
            error_after: {count: 6, period: day}
      - name: market_meta
        description: "CoinGecko market snapshot, refreshed every 5 minutes"
        config:
          loaded_at_field: ingestion_ts
          freshness:
            warn_after: {count: 1, period: day}
            error_after: {count: 6, period: day}